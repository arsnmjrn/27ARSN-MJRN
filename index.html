<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    background: #0d0a0f;
    color: #f5ede8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
      touch-action: manipulation;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, #2a0e1a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #1a0a2e 0%, transparent 55%),
                radial-gradient(ellipse at 60% 80%, #1e0d0d 0%, transparent 50%),
                #0d0a0f;
  }

  .petals-container {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
  }

  .petal {
    position: absolute; top: -40px;
    font-size: 18px;
    opacity: 0;
    animation: fallPetal linear infinite;
  }

  @keyframes fallPetal {
    0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(540deg) translateX(80px); opacity: 0; }
  }

  .wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 520px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* SCREENS */
  .screen { width: 100%; display: none; flex-direction: column; align-items: center; gap: 0; }
  .screen.active { display: flex; }

  /* LOGIN CARD */
.card {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,200,190,0.15);
  border-radius: 24px;
  padding: clamp(1.5rem, 4vw, 3rem);
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}
@media (max-width: 600px) {
  body {
    padding: 1rem;
  }

  .wrap {
    padding: 0;
    max-width: 100%;
  }

  .logo-title {
    font-size: 1.8rem;
  }

  .question-text {
    font-size: 1.25rem;
    min-height: auto;
  }

  .btn {
    padding: 1rem;
    font-size: 0.8rem;
  }

  .card {
    border-radius: 18px;
  }
}

  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,150,130,0.06) 0%, transparent 50%, rgba(180,100,200,0.04) 100%);
    pointer-events: none;
  }

  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo-heart {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: heartbeat 2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.15); }
    28% { transform: scale(1); }
    42% { transform: scale(1.1); }
    56% { transform: scale(1); }
  }

  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #f5d5c8;
  }

  .logo-sub {
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(245,200,185,0.5);
    margin-top: 0.3rem;
  }

  /* PROGRESS */
  .progress-bar {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c4637a, #e8a87c);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .step-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,200,185,0.45);
    margin-bottom: 0.6rem;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
    color: #f5d5c8;
    margin-bottom: 1.6rem;
    line-height: 1.4;
    min-height: 2.8rem;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1.2rem;
  }

  .input-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,180,160,0.2);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    font-family: 'Jost', sans-serif;
    font-size: 1rem;
    color: #f5ede8;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
  }

  .input-wrap input::placeholder { color: rgba(245,220,210,0.3); }
  .input-wrap input:focus {
    border-color: rgba(196,99,122,0.6);
    background: rgba(255,255,255,0.09);
  }

  .input-wrap input.error { border-color: rgba(220,80,80,0.7); animation: shake 0.35s ease; }
  .input-wrap input.success { border-color: rgba(100,210,140,0.7); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .err-msg {
    font-size: 0.78rem;
    color: #e87070;
    margin-top: 0.4rem;
    min-height: 1.1rem;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .btn {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #c4637a 0%, #b85575 50%, #9e4a8a 100%);
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }

  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  /* DOTS */
  .dots {
    display: flex; gap: 8px; justify-content: center; margin-top: 1.8rem;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,180,160,0.2);
    transition: background 0.3s, transform 0.3s;
  }

  .dot.done { background: rgba(196,99,122,0.8); transform: scale(1.2); }
  .dot.current { background: rgba(245,200,185,0.9); transform: scale(1.3); }

  /* HOME SCREEN */
  .home-card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,200,190,0.15);
    border-radius: 24px;
    padding: 3rem 2.5rem;
    backdrop-filter: blur(20px);
    text-align: center;
  }

  .home-welcome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    font-style: italic;
    color: #f5d5c8;
    margin-bottom: 0.5rem;
  }

  .home-sub {
    font-size: 0.78rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,200,185,0.4);
    margin-bottom: 2.5rem;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .nav-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,180,160,0.15);
    border-radius: 16px;
    padding: 1.4rem 1rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
  }

  .nav-item:hover {
    background: rgba(196,99,122,0.15);
    border-color: rgba(196,99,122,0.4);
    transform: translateY(-2px);
  }

  .nav-icon { font-size: 1.8rem; }

  .nav-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,200,185,0.7);
  }

  .logout-btn {
    background: transparent;
    border: 1px solid rgba(255,180,160,0.2);
    border-radius: 10px;
    padding: 0.6rem 1.6rem;
    color: rgba(245,200,185,0.45);
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover { border-color: rgba(196,99,122,0.4); color: #f5d5c8; }

  /* DECORATIVE LINE */
  .deco-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,99,122,0.5), transparent);
    margin: 1.5rem auto;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="petals-container" id="petals"></div>

<div class="wrap">

  <!-- LOGIN SCREEN -->
  <div class="screen active" id="screen-login">
    <div class="card">
      <div class="logo">
        <span class="logo-heart">🌹</span>
        <div class="logo-title">Our Secret Place</div>
        <div class="logo-sub">Only you know the way in</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>

      <div class="step-label" id="step-label">Question 1 of 5</div>
      <div class="question-text" id="question-text">What is the number?</div>

      <div class="input-wrap">
        <input type="text" id="answer-input" placeholder="Your answer..." autocomplete="off" />
        <div class="err-msg" id="err-msg"></div>
      </div>

      <button class="btn" id="next-btn" onclick="checkAnswer()">Continue →</button>

      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen" id="screen-home">
    <div class="home-card">
      <div style="font-size:3rem; margin-bottom:0.8rem;">💕</div>
      <div class="home-welcome">Welcome, My Love</div>
      <div class="home-sub">You knew every answer</div>
      <div class="deco-line"></div>

      <div class="nav-grid">
        <div class="nav-item">
          <span class="nav-icon">📖</span>
          <span class="nav-label">Our Story</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">📸</span>
          <span class="nav-label">Memories</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">💌</span>
          <span class="nav-label">Love Notes</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">🌟</span>
          <span class="nav-label">Our Dreams</span>
        </div>
      </div>

      <div class="deco-line"></div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

</div>

<script>
  const QUESTIONS = [
    { q: "What is the number?",             key: "27",                          hint: "Think carefully, my love..." },
    { q: "What is the love code?",           key: "WFWTWF",                      hint: "Only we know this one..." },
    { q: "How many kids?",                   key: "5",                           hint: "Our little family..." },
    { q: "Behind the necklace?",             key: "no matter what i will love you always", hint: "Those special words..." },
    { q: "What do we rely on?",              key: "FAITHFULLNESS",              hint: "Our foundation..." }
  ];

  let step = 0;
  let attempts = 0;

  function normalize(s){ return s.trim().toLowerCase().replace(/\s+/g,' '); }

  function renderStep(){
    const q = QUESTIONS[step];
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('step-label').textContent = `Question ${step+1} of ${QUESTIONS.length}`;
    document.getElementById('progress').style.width = (step / QUESTIONS.length * 100) + '%';
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').className = '';
    document.getElementById('err-msg').textContent = '';
    renderDots();
    document.getElementById('answer-input').focus();
    attempts = 0;
  }

  function renderDots(){
    const c = document.getElementById('dots');
    c.innerHTML = '';
    for(let i=0;i<QUESTIONS.length;i++){
      const d = document.createElement('div');
      d.className = 'dot' + (i < step ? ' done' : i === step ? ' current' : '');
      c.appendChild(d);
    }
  }

  function checkAnswer(){
    const inp = document.getElementById('answer-input');
    const val = normalize(inp.value);
    const correct = normalize(QUESTIONS[step].key);
    const err = document.getElementById('err-msg');

    if(!val){ err.textContent = '✦ Please enter your answer'; return; }

    if(val === correct){
      inp.className = 'success';
      err.textContent = '';
      step++;
      if(step >= QUESTIONS.length){
        document.getElementById('progress').style.width = '100%';
        setTimeout(showHome, 600);
      } else {
        setTimeout(renderStep, 450);
      }
    } else {
      attempts++;
      inp.className = 'error';
      setTimeout(()=>inp.classList.remove('error'),400);
      if(attempts >= 2){
        err.textContent = '✦ ' + QUESTIONS[step].hint;
      } else {
        err.textContent = '✦ That\'s not quite right, try again';
      }
    }
  }

function showHome(){
  localStorage.setItem("authenticated", "true");

  setTimeout(() => {
    window.location.href = "home-page.html";
  }, 1200);
}



  function logout(){
    step = 0;
    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-login').classList.add('active');
    renderStep();
  }

  document.getElementById('answer-input').addEventListener('keydown', e => {
    if(e.key === 'Enter') checkAnswer();
  });

  // PETALS
  const PETAL_CHARS = ['🌸','🌺','🌹','💮','🏵','✿','❀'];
  function spawnPetal(){
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = PETAL_CHARS[Math.floor(Math.random()*PETAL_CHARS.length)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.fontSize = (12 + Math.random()*14) + 'px';
    p.style.animationDuration = (8 + Math.random()*10) + 's';
    p.style.animationDelay = (Math.random()*6) + 's';
    document.getElementById('petals').appendChild(p);
    setTimeout(()=>p.remove(), 20000);
  }

  function createBurst(){
    for(let i=0;i<12;i++) setTimeout(spawnPetal, i*80);
  }

  setInterval(spawnPetal, 1800);
  for(let i=0;i<5;i++) setTimeout(spawnPetal, i*400);

  renderStep();




</script>
</body>
</html>
