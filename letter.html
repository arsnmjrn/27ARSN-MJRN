<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Secret Garden 🌹</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* ══ TOKENS ══════════════════════════════════════════════════════ */
:root {
  --night:      #0a0608;
  --void:       #0e0a0c;
  --deep:       #140d10;
  --card:       #1c1218;
  --surface:    #231820;
  --rim:        #2e1e26;
  --rim2:       #3d2535;
  --garnet:     #8b1a2f;
  --crimson:    #b5243e;
  --rose:       #d4405a;
  --blush:      #e8718a;
  --petal:      #f0a0b0;
  --gold:       #c9a84c;
  --gold-dim:   #7a5e28;
  --text:       #e8dce0;
  --text-dim:   #9a8088;
  --text-mute:  #5a4048;
  --me-bg:      linear-gradient(135deg, #8b1a2f 0%, #b5243e 100%);
  --her-bg:     #1c1218;
  --her-border: #3d2535;
  --shadow:     0 8px 40px rgba(0,0,0,.7);
  --glow:       0 0 30px rgba(139,26,47,.25);
  --r:          18px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--night);
  height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  cursor: default;
    touch-action: manipulation;
}

body::before {
  content: "";
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 10%  0%,  rgba(139,26,47,.18) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 95% 100%, rgba(80,10,25,.25)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50%  50%, rgba(20,8,12,.8)    0%, transparent 70%);
  pointer-events: none;
}

.petal-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.petal {
  position: absolute; top: -30px;
  font-size: 1rem; opacity: 0;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { opacity: 0; transform: translateY(-30px) rotate(0deg); }
  10%  { opacity: .4; }
  90%  { opacity: .15; }
  100% { opacity: 0; transform: translateY(110dvh) rotate(360deg); }
}

/* ══ IDENTITY SCREEN ══════════════════════════════════════════════ */
#identity-screen {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: fadeUp .7s ease;
}

.id-card {
  background: var(--card);
  border: 1px solid var(--rim2);
  border-radius: 28px;
  box-shadow: var(--shadow), var(--glow);
  padding: 3rem 2.6rem 2.4rem;
  width: min(380px, 94vw);
  display: flex; flex-direction: column;
  align-items: center; gap: 1.4rem;
  position: relative; overflow: hidden;
}

.id-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--crimson), var(--gold), var(--crimson), transparent);
}

.id-rose {
  font-size: 3.4rem; line-height: 1;
  filter: drop-shadow(0 0 16px rgba(180,36,62,.6));
  animation: roseBreath 3s ease-in-out infinite;
}
@keyframes roseBreath {
  0%,100%{ transform: scale(1);    filter: drop-shadow(0 0 16px rgba(180,36,62,.6)); }
  50%    { transform: scale(1.06); filter: drop-shadow(0 0 26px rgba(212,64,90,.9)); }
}

.id-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 400; font-style: italic;
  color: var(--text); text-align: center; line-height: 1.2;
  letter-spacing: .02em;
}
.id-sub {
  font-size: .8rem; color: var(--text-mute);
  text-align: center; letter-spacing: .08em; text-transform: uppercase;
}

.who-row { display: flex; gap: .8rem; width: 100%; }
.who-btn {
  flex: 1; padding: .8rem .5rem;
  border-radius: 14px; border: 1px solid var(--rim2);
  background: var(--surface); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem; color: var(--text-dim);
  transition: all .2s; display: flex; flex-direction: column;
  align-items: center; gap: .3rem;
}
.who-btn span:first-child { font-size: 1.6rem; }
.who-btn.active {
  background: var(--deep); border-color: var(--garnet);
  color: var(--petal);
  box-shadow: 0 0 18px rgba(139,26,47,.35);
}

.btn-enter {
  width: 100%; padding: .9rem;
  background: linear-gradient(135deg, var(--garnet), var(--crimson));
  color: #fff; border: none; border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500; font-size: 1rem; cursor: pointer;
  letter-spacing: .04em;
  transition: opacity .2s, transform .12s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(139,26,47,.5);
}
.btn-enter:hover  { opacity: .92; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(180,36,62,.6); }
.btn-enter:active { transform: translateY(0); }
.btn-enter:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ══ CHAT SHELL ═══════════════════════════════════════════════════ */
#chat-shell {
  display: none; flex-direction: column;
  width: min(500px, 100vw); height: 100dvh;
  background: var(--void);
  position: relative; z-index: 1; overflow: hidden;
  border-left: 1px solid var(--rim); border-right: 1px solid var(--rim);
}

.chat-header {
  background: var(--deep);
  border-bottom: 1px solid var(--rim);
  padding: 1rem 1.2rem;
  display: flex; align-items: center; gap: 1rem;
  flex-shrink: 0;
  position: relative; overflow: hidden;
}
.chat-header::after {
  content: "";
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--garnet), transparent);
}

.hdr-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--surface);
  border: 1.5px solid var(--garnet);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
  box-shadow: 0 0 14px rgba(139,26,47,.4);
}

.hdr-info { flex: 1; }
.hdr-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem; font-weight: 600;
  color: var(--text); letter-spacing: .03em;
}
.hdr-status { font-size: .7rem; color: var(--text-mute); margin-top: .15rem; letter-spacing: .06em; }

.hdr-right { display: flex; align-items: center; gap: .4rem; }
.hdr-who {
  font-size: .7rem; color: var(--text-mute);
  padding: .25rem .6rem; border-radius: 20px;
  border: 1px solid var(--rim2); background: var(--surface);
  letter-spacing: .05em;
}
.icon-btn {
  background: none; border: none;
  color: var(--text-mute); font-size: 1.1rem;
  cursor: pointer; padding: .4rem; border-radius: 8px;
  transition: color .2s, background .2s; line-height: 1;
}
.icon-btn:hover { color: var(--rose); background: var(--surface); }

#messages {
  flex: 1; overflow-y: auto;
  padding: 1.1rem 1rem .6rem;
  display: flex; flex-direction: column; gap: .4rem;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--rim2); border-radius: 3px; }

.date-divider {
  text-align: center; font-size: .65rem;
  color: var(--text-mute); margin: .7rem 0;
  display: flex; align-items: center; gap: .6rem;
  letter-spacing: .1em; text-transform: uppercase;
}
.date-divider::before, .date-divider::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rim2), transparent);
}

.msg-row {
  display: flex; flex-direction: column;
  max-width: 76%; animation: bubbleIn .2s ease;
}
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(10px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-row.me  { align-self: flex-end;   align-items: flex-end; }
.msg-row.her { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: .62rem 1rem; border-radius: var(--r);
  font-size: .9rem; line-height: 1.55;
  word-break: break-word; white-space: pre-wrap;
  position: relative;
}
.msg-row.me .bubble {
  background: var(--me-bg);
  color: #fff;
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 16px rgba(139,26,47,.45);
}
.msg-row.her .bubble {
  background: var(--her-bg);
  color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--her-border);
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
}

.bubble.e-big {
  background: transparent !important;
  box-shadow: none !important; border: none !important;
  font-size: 2.8rem; padding: .1rem .3rem; line-height: 1.15;
  filter: drop-shadow(0 2px 8px rgba(139,26,47,.4));
}

.msg-time {
  font-size: .6rem; color: var(--text-mute);
  margin-top: .2rem; padding: 0 .3rem;
  letter-spacing: .04em;
}

.typing-wrap { align-self: flex-start; display: none; }
.typing-wrap.show { display: flex; }
.typing-bubble {
  background: var(--her-bg); border: 1px solid var(--her-border);
  border-radius: var(--r); border-bottom-left-radius: 4px;
  padding: .7rem 1rem; display: flex; gap: .35rem; align-items: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
}
.tdot {
  width: 6px; height: 6px; background: var(--garnet); border-radius: 50%;
  animation: tdot 1.3s infinite;
}
.tdot:nth-child(2){ animation-delay: .2s; }
.tdot:nth-child(3){ animation-delay: .4s; }
@keyframes tdot {
  0%,80%,100%{ transform: scale(1); opacity: .3; }
  40%{ transform: scale(1.3); opacity: 1; }
}

#emoji-panel {
  display: none; flex-direction: column;
  background: var(--card); border-top: 1px solid var(--rim);
  padding: .7rem .8rem .6rem; flex-shrink: 0; max-height: 240px;
}
#emoji-panel.open { display: flex; }

.etabs {
  display: flex; gap: .3rem;
  overflow-x: auto; padding-bottom: .45rem; scrollbar-width: none;
}
.etabs::-webkit-scrollbar { display: none; }
.etab {
  background: none; border: none;
  font-size: 1.1rem; cursor: pointer;
  padding: .28rem .45rem; border-radius: 8px;
  transition: background .15s; flex-shrink: 0; color: var(--text-dim);
}
.etab:hover, .etab.active { background: var(--rim); }

.egrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
  gap: .2rem; overflow-y: auto; flex: 1; padding-top: .35rem;
}
.egrid::-webkit-scrollbar { width: 2px; }
.egrid::-webkit-scrollbar-thumb { background: var(--rim2); }
.ecell {
  font-size: 1.5rem; cursor: pointer;
  text-align: center; padding: .22rem; border-radius: 9px;
  transition: background .12s, transform .1s; user-select: none;
}
.ecell:hover { background: var(--rim); transform: scale(1.2); }

.input-bar {
  display: flex; align-items: flex-end; gap: .5rem;
  padding: .7rem .9rem; background: var(--deep);
  border-top: 1px solid var(--rim); flex-shrink: 0;
  position: relative;
}
.input-bar::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rim2), transparent);
}

#msg-input {
  flex: 1;
  background: var(--surface); border: 1px solid var(--rim);
  border-radius: 22px; padding: .68rem 1.1rem;
  font-family: 'DM Sans', sans-serif; font-size: .9rem;
  color: var(--text); outline: none; resize: none;
  max-height: 110px; line-height: 1.5;
  transition: border-color .2s; overflow-y: auto;
  caret-color: var(--rose);
}
#msg-input:focus { border-color: var(--garnet); box-shadow: 0 0 0 3px rgba(139,26,47,.15); }
#msg-input::placeholder { color: var(--text-mute); }
#msg-input::-webkit-scrollbar { width: 0; }

.emoji-toggle {
  background: none; border: none;
  font-size: 1.3rem; cursor: pointer;
  padding: .38rem; border-radius: 50%;
  transition: background .15s; line-height: 1;
  flex-shrink: 0; align-self: flex-end;
  color: var(--text-mute);
}
.emoji-toggle:hover { background: var(--rim); color: var(--rose); }

.send-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--garnet), var(--crimson));
  color: #fff; border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; cursor: pointer;
  flex-shrink: 0; align-self: flex-end;
  transition: transform .15s, box-shadow .2s;
  box-shadow: 0 3px 14px rgba(139,26,47,.5);
}
.send-btn:hover  { transform: scale(1.08); box-shadow: 0 4px 20px rgba(180,36,62,.65); }
.send-btn:active { transform: scale(.95); }
.send-btn svg { width: 18px; height: 18px; fill: #fff; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--rim2);
  color: var(--text-dim); font-size: .78rem;
  padding: .5rem 1.1rem; border-radius: 20px;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  z-index: 999; letter-spacing: .04em;
}
#toast.show { opacity: 1; }

/* Loading state */
#loading-status {
  font-size: .75rem; color: var(--text-mute);
  text-align: center; letter-spacing: .05em;
}
</style>
</head>
<body>

<div class="petal-layer" id="petals"></div>

<!-- ═════════ IDENTITY SCREEN ═════════ -->
<div id="identity-screen">
  <div class="id-card">
    <div class="id-rose">🌹</div>
    <div class="id-title">Our Secret Garden</div>
    <div class="id-sub">A private space for two hearts</div>

    <div class="who-row">
      <button class="who-btn active" id="who-h" onclick="selectWho('husband')">
        <span>🤵</span><span>ARSENE(HUSBAND)</span>
      </button>
      <button class="who-btn" id="who-w" onclick="selectWho('wife')">
        <span>👰</span><span>MAJORINE(WIFE)</span>
      </button>
    </div>

    <div id="loading-status">Connecting to our garden… 🌹</div>

    <button class="btn-enter" id="enter-btn" onclick="enterChat()" disabled>
      Enter Our Garden &nbsp;🌹
    </button>
  </div>
</div>

<!-- ═════════ CHAT SHELL ═════════ -->
<div id="chat-shell">

  <div class="chat-header">
    <div class="hdr-avatar" id="hdr-avatar">🌹</div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">My Love</div>
      <div class="hdr-status">✦ &nbsp;our secret garden &nbsp;✦</div>
    </div>
    <div class="hdr-right">
      <span class="hdr-who" id="hdr-who">—</span>
      <button class="icon-btn" title="Leave" onclick="leaveChat()">✕</button>
    </div>
  </div>

  <div id="messages">
    <div class="date-divider">✦ &nbsp;the beginning of forever &nbsp;✦</div>
    <div class="typing-wrap" id="typing-wrap">
      <div class="typing-bubble">
        <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
      </div>
    </div>
  </div>

  <div id="emoji-panel">
    <div class="etabs" id="etabs"></div>
    <div class="egrid" id="egrid"></div>
  </div>

  <div class="input-bar">
    <button class="emoji-toggle" onclick="toggleEmoji(event)">🌸</button>
    <textarea id="msg-input" rows="1"
              placeholder="Whisper something sweet…"
              oninput="autoResize(this)"
              onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

let currentWho = 'husband', currentSender;
let supabaseClient = null;

// ── Spawn petals ──────────────────────────────────────────────────
(function spawnPetals() {
  const layer = document.getElementById('petals');
  const symbols = ['🌹','🌸','🌺','✨','💕','🌷'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');

})();

// ── Boot ──────────────────────────────────────────────────────────
// ✅ FIX 2: Wait for the Supabase script to fully load before init.
//    Using DOMContentLoaded is too early if the script loads async.
//    We use window.onload which fires after all scripts are parsed.
window.addEventListener('load', () => {
  buildEmojiPicker();
  initSupabase();
});

function initSupabase() {
  try {
    // ✅ FIX 3: The global from the UMD build is window.supabase (lowercase),
    //    and createClient lives on it. We store the client in supabaseClient
    //    to avoid name collision with the global 'supabase' namespace object.
    if (!window.supabase || !window.supabase.createClient) {
      throw new Error('Supabase library not found on window');
    }

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Enable the enter button and update status
    document.getElementById('enter-btn').disabled = false;
    document.getElementById('loading-status').textContent = 'Ready to enter 🌹';
    document.getElementById('loading-status').style.color = 'var(--blush)';

  } catch (err) {
    console.error('Supabase init error:', err);
    document.getElementById('loading-status').textContent = 'Connection failed ❌ Check console.';
    document.getElementById('loading-status').style.color = 'var(--rose)';
  }
}

// ── Who selector ──────────────────────────────────────────────────
function selectWho(who) {
  currentWho = who;
  document.getElementById('who-h').classList.toggle('active', who === 'husband');
  document.getElementById('who-w').classList.toggle('active', who === 'wife');
}

// ── Enter chat ────────────────────────────────────────────────────
function enterChat() {
  if (!supabaseClient) {
    toast('Still connecting… please wait 🌹');
    return;
  }

  currentSender = currentWho;
  const isHusband = currentWho === 'husband';

  document.getElementById('hdr-name').textContent   = isHusband ? 'MAJORINE-WIFE 👰' : 'ARSENE-HUSBAND 🤵';
  document.getElementById('hdr-avatar').textContent = isHusband ? '👰' : '🤵';
  document.getElementById('hdr-who').textContent    = isHusband ? '🤵 Husband' : '👰 Wife';

  document.getElementById('identity-screen').style.display = 'none';
  document.getElementById('chat-shell').style.display = 'flex';

  loadHistory();
  subscribeRealtime();
  document.getElementById('msg-input').focus();
}

function leaveChat() {
  if (channel) supabaseClient.removeChannel(channel);
  document.getElementById('identity-screen').style.display = 'flex';
  document.getElementById('chat-shell').style.display      = 'none';
  messages = [];
  lastRender = null;
}

// ── Load history ──────────────────────────────────────────────────
async function loadHistory() {
  const { data, error } = await supabaseClient
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(300);

  if (error) { console.error('History error:', error); return; }
  messages = data || [];
  renderAll();
}

// ── Realtime subscription ─────────────────────────────────────────
function subscribeRealtime() {
  channel = supabaseClient
    .channel('public:messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' },
      payload => {
        if (!messages.find(m => m.id === payload.new.id)) {
          messages.push(payload.new);
          renderOne(payload.new);
          scrollBottom();
        }
      }
    )
    .subscribe();
}

// ── Render all ────────────────────────────────────────────────────
function renderAll() {
  const box    = document.getElementById('messages');
  const typing = document.getElementById('typing-wrap');
  box.querySelectorAll('.msg-row, .date-divider:not(:first-child)').forEach(el => el.remove());
  lastRender = null;
  messages.forEach(m => renderOne(m, false));
  scrollBottom();
}

function renderOne(msg, animate = true) {
  const box    = document.getElementById('messages');
  const typing = document.getElementById('typing-wrap');

  const ts      = new Date(msg.created_at);
  const dateStr = ts.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });

  if (dateStr !== lastRender) {
    const divEl = document.createElement('div');
    divEl.className   = 'date-divider';
    divEl.textContent = dateStr;
    box.insertBefore(divEl, typing);
    lastRender = dateStr;
  }

  const isMe = msg.sender === currentSender;
  const row  = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'her'}`;
  if (!animate) row.style.animation = 'none';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  const txt = (msg.text || '').trim();

  const pure = txt.replace(/\s/g,'');
  const emojiOnly = pure.length > 0 && pure.length <= 8 &&
    [...txt].every(c => c.codePointAt(0) > 127 || c === ' ');
  if (emojiOnly) bub.classList.add('e-big');

  bub.textContent = txt;

  const timeEl = document.createElement('div');
  timeEl.className   = 'msg-time';
  timeEl.textContent = ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  row.appendChild(bub); row.appendChild(timeEl);
  box.insertBefore(row, typing);
}

// ── Send ──────────────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('msg-input');
  const txt = inp.value.trim();
  if (!txt) return;

  inp.value = ''; autoResize(inp);

  const optimistic = {
    id: 'opt_' + Date.now(),
    text: txt,
    sender: currentSender,
    created_at: new Date().toISOString()
  };
  messages.push(optimistic);
  renderOne(optimistic);
  scrollBottom();

  const { error } = await supabaseClient
    .from('messages')
    .insert([{ text: txt, sender: currentSender }]);

  if (error) {
    console.error('Send failed:', error);
    toast('Message failed to send 😢');
  }
}

// ── Emoji picker ──────────────────────────────────────────────────
function buildEmojiPicker() {
  const tabs = document.getElementById('etabs');
  let first  = true;
  for (const [lbl, list] of Object.entries(EMOJIS)) {
    const btn = document.createElement('button');
    btn.className   = 'etab' + (first ? ' active' : '');
    btn.textContent = lbl.split(' ')[0];
    btn.title       = lbl;
    btn.onclick     = () => {
      document.querySelectorAll('.etab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fillGrid(list);
    };
    tabs.appendChild(btn);
    if (first) fillGrid(list);
    first = false;
  }
}

function fillGrid(list) {
  const grid = document.getElementById('egrid');
  grid.innerHTML = '';
  list.forEach(e => {
    const cell = document.createElement('span');
    cell.className   = 'ecell';
    cell.textContent = e;
    cell.onclick     = () => insertEmoji(e);
    grid.appendChild(cell);
  });
}

function insertEmoji(e) {
  const inp = document.getElementById('msg-input');
  const pos = inp.selectionStart ?? inp.value.length;
  inp.value = inp.value.slice(0, pos) + e + inp.value.slice(pos);
  inp.focus();
  inp.selectionStart = inp.selectionEnd = pos + [...e].length;
  autoResize(inp);
}

function toggleEmoji(ev) {
  ev.stopPropagation();
  document.getElementById('emoji-panel').classList.toggle('open');
}

document.addEventListener('click', ev => {
  const p = document.getElementById('emoji-panel');
  if (!p.contains(ev.target)) p.classList.remove('open');
});

// ── Helpers ───────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}
function toast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
</script>
</body>
</html>
