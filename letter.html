<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arsene & Majorine 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #1a0a12;
  --card:      rgba(255,255,255,0.07);
  --surface:   rgba(255,255,255,0.05);
  --rim:       rgba(255,255,255,0.12);
  --rim2:      rgba(255,255,255,0.18);
  --garnet:    #c0392b;
  --crimson:   #e74c3c;
  --rose:      #ff6b81;
  --blush:     #ffb3bf;
  --petal:     #ffd6dd;
  --gold:      #f0c040;
  --gold-dim:  #a07820;
  --text:      #fff5f7;
  --text-dim:  rgba(255,245,247,0.65);
  --text-mute: rgba(255,245,247,0.35);
  --me-bg:     linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
  --her-border:rgba(255,255,255,0.18);
  --shadow:    0 8px 40px rgba(0,0,0,.6);
  --r:         18px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  height:100dvh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ─── BG IMAGE ─────────────────────────────────────────────────── */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:url('backgroundphoto.jpg') center/cover no-repeat;
}
/* Lighter overlay so photo is more visible */
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(
    160deg,
    rgba(10,2,6,0.55) 0%,
    rgba(30,6,14,0.50) 40%,
    rgba(10,2,6,0.60) 100%
  );
}

/* ─── PETALS ────────────────────────────────────────────────────── */
.petal-layer{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.petal{position:absolute;top:-30px;opacity:0;animation:petalFall linear infinite;}
@keyframes petalFall{
  0%  {opacity:0;transform:translateY(-30px) rotate(0deg);}
  10% {opacity:.35;}
  90% {opacity:.1;}
  100%{opacity:0;transform:translateY(110dvh) rotate(400deg);}
}

/* ─── IDENTITY SCREEN ───────────────────────────────────────────── */
#identity-screen{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  animation:fadeUp .7s ease;
}
.id-card{
  background:rgba(20,4,10,0.82);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,107,129,0.25);
  border-radius:28px;
  box-shadow:var(--shadow),0 0 60px rgba(192,57,43,.2);
  padding:2.6rem 2.4rem 2.2rem;
  width:min(360px,94vw);
  display:flex;flex-direction:column;align-items:center;gap:1.3rem;
  position:relative;overflow:hidden;
}
.id-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--crimson),var(--gold),var(--crimson),transparent);
}
.id-photo{
  width:90px;height:90px;border-radius:50%;
  border:3px solid var(--crimson);
  box-shadow:0 0 0 5px rgba(192,57,43,0.2),0 0 30px rgba(231,76,60,0.5);
  object-fit:cover;
  animation:roseBreath 3s ease-in-out infinite;
  background:#3d1020 url('majorine3.jpg') center/cover no-repeat;
}
@keyframes roseBreath{
  0%,100%{box-shadow:0 0 0 5px rgba(192,57,43,0.2),0 0 30px rgba(231,76,60,0.5);}
  50%    {box-shadow:0 0 0 7px rgba(192,57,43,0.3),0 0 50px rgba(231,76,60,0.8);}
}
.id-title{
  font-family:'Playfair Display',serif;
  font-size:1.7rem;font-weight:400;font-style:italic;
  color:var(--text);text-align:center;line-height:1.2;letter-spacing:.02em;
}
.id-names{
  font-size:.72rem;color:var(--gold);letter-spacing:.18em;
  text-transform:uppercase;text-align:center;
}
.who-row{display:flex;gap:.7rem;width:100%;}
.who-btn{
  flex:1;padding:.75rem .5rem;border-radius:14px;
  border:1px solid var(--rim2);background:var(--surface);
  cursor:pointer;font-family:'Nunito',sans-serif;
  font-size:.82rem;color:var(--text-dim);
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.25rem;
}
.who-btn .av{
  width:48px;height:48px;border-radius:50%;
  object-fit:cover;border:2px solid transparent;
  background:#3d1020 center/cover no-repeat;
}
#who-h .av { background-image: url('arsene-image1.jpg'); }
#who-w .av { background-image: url('majorine3.jpg'); }
.who-btn span:not(.av){font-size:.75rem;font-weight:600;letter-spacing:.05em;}
.who-btn.active{
  background:rgba(192,57,43,0.15);
  border-color:var(--garnet);color:var(--petal);
  box-shadow:0 0 18px rgba(192,57,43,.3);
}
.who-btn.active .av{border-color:var(--rose);}
.btn-enter{
  width:100%;padding:.85rem;
  background:linear-gradient(135deg,var(--garnet),var(--crimson));
  color:#fff;border:none;border-radius:14px;
  font-family:'Nunito',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;
  letter-spacing:.06em;transition:opacity .2s,transform .12s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(192,57,43,.5);
}
.btn-enter:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 6px 28px rgba(231,76,60,.6);}
.btn-enter:active{transform:translateY(0);}
.btn-enter:disabled{opacity:.45;cursor:not-allowed;transform:none;}
#loading-status{font-size:.72rem;color:var(--text-mute);letter-spacing:.06em;text-align:center;}

/* ─── CHAT SHELL ────────────────────────────────────────────────── */
#chat-shell{
  display:none;flex-direction:column;
  width:min(490px,100vw);height:100dvh;
  position:relative;z-index:3;overflow:hidden;
}
#chat-shell::before{
  content:"";position:absolute;inset:0;
  background:rgba(10,2,8,0.35);
  backdrop-filter:blur(1px);
  pointer-events:none;
}

/* ─── HEADER ────────────────────────────────────────────────────── */
.chat-header{
  background:rgba(12,3,8,0.70);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,107,129,0.2);
  padding:.85rem 1.1rem;
  display:flex;align-items:center;gap:.9rem;
  flex-shrink:0;position:relative;z-index:1;
}
.chat-header::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(231,76,60,.4),transparent);
}
.hdr-avatar{
  width:46px;height:46px;border-radius:50%;
  border:2px solid var(--crimson);
  box-shadow:0 0 16px rgba(192,57,43,.5);
  object-fit:cover;flex-shrink:0;overflow:hidden;
  background:#3d1020 center/cover no-repeat;
}
.hdr-info{flex:1;}
.hdr-name{
  font-family:'Playfair Display',serif;
  font-size:1.05rem;font-weight:600;color:var(--text);letter-spacing:.02em;
}
.hdr-status{
  font-size:.67rem;color:var(--text-mute);margin-top:.1rem;letter-spacing:.06em;
  display:flex;align-items:center;gap:.35rem;
}
.online-dot{
  width:6px;height:6px;border-radius:50%;
  background:#4caf50;box-shadow:0 0 6px #4caf50;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.hdr-right{display:flex;align-items:center;gap:.4rem;}
.hdr-who{
  font-size:.67rem;color:var(--text-mute);
  padding:.22rem .55rem;border-radius:20px;
  border:1px solid var(--rim);background:rgba(255,255,255,.05);
  letter-spacing:.05em;
}
.icon-btn{
  background:none;border:none;color:var(--text-mute);font-size:1.1rem;
  cursor:pointer;padding:.35rem;border-radius:8px;
  transition:color .2s,background .2s;line-height:1;
}
.icon-btn:hover{color:var(--rose);background:rgba(255,255,255,.08);}

/* ─── MESSAGES ──────────────────────────────────────────────────── */
#messages{
  flex:1;overflow-y:auto;
  padding:1rem .9rem .5rem;
  display:flex;flex-direction:column;gap:.35rem;
  scroll-behavior:smooth;
  position:relative;z-index:1;
}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:rgba(255,107,129,.3);border-radius:3px;}
.date-divider{
  text-align:center;font-size:.62rem;
  color:var(--text-mute);margin:.6rem 0;
  display:flex;align-items:center;gap:.5rem;
  letter-spacing:.1em;text-transform:uppercase;
}
.date-divider::before,.date-divider::after{
  content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,107,129,.25),transparent);
}

/* ─── MESSAGE ROW ───────────────────────────────────────────────── */
.msg-row{
  display:flex;flex-direction:column;
  max-width:78%;animation:bubbleIn .2s ease;
  position:relative;
}
@keyframes bubbleIn{
  from{opacity:0;transform:translateY(8px) scale(.97);}
  to  {opacity:1;transform:translateY(0) scale(1);}
}
.msg-row.me {align-self:flex-end;align-items:flex-end;}
.msg-row.her{align-self:flex-start;align-items:flex-start;}

/* ─── BUBBLE ────────────────────────────────────────────────────── */
.bubble-wrap { position:relative; display:inline-block; }

.bubble{
  padding:.6rem .95rem;border-radius:var(--r);
  font-size:.88rem;line-height:1.55;
  word-break:break-word;white-space:pre-wrap;position:relative;
  cursor:pointer;
  user-select:text;
}
.msg-row.me  .bubble{
  background:var(--me-bg);color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 16px rgba(192,57,43,.5);
}
.msg-row.her .bubble{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  color:var(--text);
  border-bottom-left-radius:4px;
  border:1px solid var(--her-border);
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.bubble.e-big{
  background:transparent!important;box-shadow:none!important;border:none!important;
  font-size:2.8rem;padding:.1rem .2rem;line-height:1.15;
}

/* ─── REPLY PREVIEW inside bubble ──────────────────────────────── */
.reply-preview{
  background:rgba(0,0,0,0.18);
  border-left:3px solid var(--gold);
  border-radius:8px;
  padding:.35rem .6rem;
  margin-bottom:.45rem;
  font-size:.75rem;
  color:rgba(255,255,255,0.75);
  cursor:pointer;
  max-width:100%;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.msg-row.her .bubble .reply-preview{
  background:rgba(255,255,255,0.1);
  border-left-color:var(--rose);
}
.reply-preview .rp-name{
  font-weight:700;font-size:.68rem;
  color:var(--gold);display:block;margin-bottom:.1rem;letter-spacing:.04em;
}
.msg-row.her .bubble .reply-preview .rp-name{ color:var(--rose); }

/* ─── REACTIONS ─────────────────────────────────────────────────── */
.reactions-row{
  display:flex;flex-wrap:wrap;gap:.3rem;
  margin-top:.25rem;
}
.reaction-chip{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:.18rem .5rem;
  font-size:.8rem;cursor:pointer;
  transition:transform .15s,background .15s;
  display:flex;align-items:center;gap:.25rem;
  user-select:none;
}
.reaction-chip:hover{ transform:scale(1.12); background:rgba(255,255,255,0.18); }
.reaction-chip.mine{ background:rgba(192,57,43,0.25); border-color:rgba(231,76,60,.5); }
.reaction-chip .rc-count{ font-size:.68rem; color:var(--text-dim); font-weight:600; }

/* ─── MESSAGE ACTIONS POPUP ─────────────────────────────────────── */
.msg-actions{
  position:absolute;
  z-index:50;
  display:none;
  flex-direction:row;
  gap:.2rem;
  background:rgba(18,4,10,0.95);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,107,129,0.25);
  border-radius:40px;
  padding:.35rem .55rem;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
  animation:fadeUp .15s ease;
  white-space:nowrap;
}
.msg-actions.show{ display:flex; }
.msg-row.me  .msg-actions{ right:0; bottom:calc(100% + 8px); }
.msg-row.her .msg-actions{ left:0;  bottom:calc(100% + 8px); }

.act-btn{
  background:none;border:none;cursor:pointer;
  font-size:1.1rem;padding:.22rem .3rem;border-radius:8px;
  transition:background .15s,transform .1s;line-height:1;
  color:var(--text-dim);
}
.act-btn:hover{ background:rgba(255,255,255,.1); transform:scale(1.15); }
.act-sep{ width:1px; background:rgba(255,255,255,.12); margin:0 .1rem; align-self:stretch; }

/* Quick-reaction bar */
.quick-reactions{
  position:absolute;
  z-index:51;
  display:none;
  flex-direction:row;
  gap:.25rem;
  background:rgba(18,4,10,0.95);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,107,129,0.25);
  border-radius:40px;
  padding:.4rem .6rem;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
  animation:fadeUp .15s ease;
}
.quick-reactions.show{ display:flex; }
.msg-row.me  .quick-reactions{ right:0; bottom:calc(100% + 56px); }
.msg-row.her .quick-reactions{ left:0;  bottom:calc(100% + 56px); }
.qr-btn{
  font-size:1.4rem;cursor:pointer;padding:.15rem .2rem;
  border-radius:8px;border:none;background:none;
  transition:transform .12s,background .12s;line-height:1;
}
.qr-btn:hover{ transform:scale(1.3); background:rgba(255,255,255,.1); }

/* ─── META ──────────────────────────────────────────────────────── */
.msg-meta{
  display:flex;align-items:center;gap:.3rem;
  font-size:.6rem;color:var(--text-mute);margin-top:.18rem;padding:0 .3rem;
}
.msg-row.me .msg-meta{justify-content:flex-end;}
.read-ticks{font-size:.72rem;line-height:1;}
.read-ticks.sent{color:rgba(255,255,255,.4);}
.read-ticks.read{color:var(--gold);}

/* ─── REPLY BANNER (input area) ─────────────────────────────────── */
#reply-banner{
  display:none;flex-shrink:0;
  align-items:center;gap:.6rem;
  background:rgba(12,3,8,0.75);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,107,129,0.15);
  padding:.5rem .85rem;
  position:relative;z-index:1;
}
#reply-banner.show{ display:flex; }
#reply-banner::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(231,76,60,.35),transparent);
}
.rb-bar{ width:3px; border-radius:2px; background:var(--gold); align-self:stretch; flex-shrink:0; }
.rb-info{ flex:1; min-width:0; }
.rb-name{ font-size:.68rem; font-weight:700; color:var(--gold); letter-spacing:.04em; }
.rb-text{ font-size:.75rem; color:var(--text-mute); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rb-close{
  background:none;border:none;color:var(--text-mute);cursor:pointer;
  font-size:1rem;padding:.2rem;border-radius:6px;transition:color .15s;
  flex-shrink:0;
}
.rb-close:hover{ color:var(--rose); }

/* ─── TYPING ────────────────────────────────────────────────────── */
.typing-wrap{align-self:flex-start;display:none;}
.typing-wrap.show{display:flex;flex-direction:column;align-items:flex-start;}
.typing-bubble{
  background:rgba(255,255,255,.11);
  backdrop-filter:blur(10px);
  border:1px solid var(--her-border);
  border-radius:var(--r);border-bottom-left-radius:4px;
  padding:.65rem 1rem;display:flex;gap:.32rem;align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  animation:bubbleIn .2s ease;
}
.typing-label{font-size:.62rem;color:var(--text-mute);margin-top:.18rem;padding:0 .3rem;letter-spacing:.04em;font-style:italic;}
.tdot{width:6px;height:6px;background:var(--rose);border-radius:50%;animation:tdot 1.3s infinite;}
.tdot:nth-child(2){animation-delay:.2s;}
.tdot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{transform:scale(1);opacity:.3;}40%{transform:scale(1.4);opacity:1;}}

/* ─── EMOJI PANEL ───────────────────────────────────────────────── */
#emoji-panel{
  display:none;flex-direction:column;
  background:rgba(10,3,7,0.88);backdrop-filter:blur(18px);
  border-top:1px solid var(--rim);padding:.65rem .75rem .55rem;
  flex-shrink:0;max-height:220px;position:relative;z-index:1;
}
#emoji-panel.open{display:flex;}
.etabs{display:flex;gap:.25rem;overflow-x:auto;padding-bottom:.4rem;scrollbar-width:none;}
.etabs::-webkit-scrollbar{display:none;}
.etab{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:.25rem .42rem;border-radius:8px;transition:background .15s;flex-shrink:0;color:var(--text-dim);}
.etab:hover,.etab.active{background:rgba(255,255,255,.1);}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:.18rem;overflow-y:auto;flex:1;padding-top:.3rem;}
.egrid::-webkit-scrollbar{width:2px;}
.egrid::-webkit-scrollbar-thumb{background:var(--rim2);}
.ecell{font-size:1.45rem;cursor:pointer;text-align:center;padding:.2rem;border-radius:8px;transition:background .12s,transform .1s;user-select:none;}
.ecell:hover{background:rgba(255,255,255,.1);transform:scale(1.2);}

/* ─── INPUT BAR ─────────────────────────────────────────────────── */
.input-bar{
  display:flex;align-items:flex-end;gap:.45rem;
  padding:.65rem .85rem;
  background:rgba(8,2,6,0.70);backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,107,129,.15);flex-shrink:0;
  position:relative;z-index:1;
}
.input-bar::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(231,76,60,.3),transparent);
}
#msg-input{
  flex:1;background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:22px;padding:.65rem 1.1rem;
  font-family:'Nunito',sans-serif;font-size:.88rem;
  color:var(--text);outline:none;resize:none;
  max-height:110px;line-height:1.5;overflow-y:auto;
  transition:border-color .2s;caret-color:var(--rose);
}
#msg-input:focus{border-color:rgba(231,76,60,.5);box-shadow:0 0 0 3px rgba(192,57,43,.15);}
#msg-input::placeholder{color:var(--text-mute);}
#msg-input::-webkit-scrollbar{width:0;}
.emoji-toggle{background:none;border:none;font-size:1.3rem;cursor:pointer;padding:.35rem;border-radius:50%;transition:background .15s;line-height:1;flex-shrink:0;align-self:flex-end;color:var(--text-mute);}
.emoji-toggle:hover{background:rgba(255,255,255,.1);color:var(--rose);}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--garnet),var(--crimson));color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:.95rem;cursor:pointer;flex-shrink:0;align-self:flex-end;transition:transform .15s,box-shadow .2s;box-shadow:0 3px 14px rgba(192,57,43,.5);}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(231,76,60,.65);}
.send-btn:active{transform:scale(.95);}
.send-btn svg{width:18px;height:18px;fill:#fff;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(20,5,12,.9);backdrop-filter:blur(10px);
  border:1px solid var(--rim2);color:var(--text-dim);font-size:.75rem;
  padding:.48rem 1rem;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;letter-spacing:.04em;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="petal-layer" id="petals"></div>

<!-- ═════ IDENTITY SCREEN ═════ -->
<div id="identity-screen">
  <div class="id-card">
    <div class="id-photo"></div>
    <div class="id-title">Arsene &amp; Majorine</div>
    <div class="id-names">✦ &nbsp;Our Secret Garden &nbsp;✦</div>
    <div class="who-row">
      <button class="who-btn active" id="who-h" onclick="selectWho('husband')">
        <div class="av"></div>
        <span>ARSENE</span>
      </button>
      <button class="who-btn" id="who-w" onclick="selectWho('wife')">
        <div class="av"></div>
        <span>MAJORINE</span>
      </button>
    </div>
    <div id="loading-status">Connecting to our garden… 🌹</div>
    <button class="btn-enter" id="enter-btn" onclick="enterChat()" disabled>
      Enter Our Garden &nbsp;🌹
    </button>
  </div>
</div>

<!-- ═════ CHAT SHELL ═════ -->
<div id="chat-shell">
  <div class="chat-header">
    <div class="hdr-avatar" id="hdr-avatar"></div>

/* ══ HISTORY ══ */
async function loadHistory(){
  const {data,error}=await supabaseClient
    .from('messages').select('*')
    .order('created_at',{ascending:true}).limit(300);
  if(error){console.error('History:',error);return;}
  messages=data||[];
  renderAll();
  await markAllRead();
}

/* ══ REALTIME ══ */
function subscribeRealtime(){
  msgChannel = supabaseClient
    .channel('room:messages')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},
      payload=>{
        if(!messages.find(m=>m.id===payload.new.id)){
          messages.push(payload.new);
          renderOne(payload.new);
          scrollBottom();
          if(payload.new.sender !== currentSender) markAllRead();
        }
      }
    )
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},
      payload=>{
        const idx = messages.findIndex(m=>m.id===payload.new.id);
        if(idx>-1){ messages[idx]=payload.new; updateReadTick(payload.new); }
      }
    )
    .subscribe();
}

/* ══ READ STATUS ══ */
async function markAllRead(){
  const partner = currentSender==='husband'?'wife':'husband';
  const unread = messages.filter(m=>m.sender===partner && !m.read_at);
  if(unread.length===0) return;
  const ids = unread.map(m=>m.id);
  await supabaseClient.from('messages').update({read_at: new Date().toISOString()}).in('id', ids);
}

function subscribeReadStatus(){
  readChannel = supabaseClient
    .channel('room:read')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},
      payload=>{
        const idx = messages.findIndex(m=>m.id===payload.new.id);
        if(idx>-1){ messages[idx]=payload.new; updateReadTick(payload.new); }
      }
    ).subscribe();
}

function updateReadTick(msg){

/* ══ REACTIONS ══════════════════════════════════════════════════════
   Schema expected: table "reactions" with columns:
     id (uuid pk), message_id (uuid fk), sender (text), emoji (text)
   If you don't have this table yet, reactions will silently fail.
═══════════════════════════════════════════════════════════════════ */
let reactionsMap = {}; // { messageId: [{id, sender, emoji}] }

async function loadReactions(msgIds){
  if(!msgIds.length) return;
  const {data}=await supabaseClient.from('reactions').select('*').in('message_id', msgIds);
  if(!data) return;
  data.forEach(r=>{
    if(!reactionsMap[r.message_id]) reactionsMap[r.message_id]=[];
    if(!reactionsMap[r.message_id].find(x=>x.id===r.id)) reactionsMap[r.message_id].push(r);
  });
  // Re-render reaction rows
  msgIds.forEach(id=>renderReactionRow(id));
}

function subscribeReactions(){
  reactChannel = supabaseClient
    .channel('room:reactions')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'reactions'},
      payload=>{
        const r=payload.new;
        if(!reactionsMap[r.message_id]) reactionsMap[r.message_id]=[];
        if(!reactionsMap[r.message_id].find(x=>x.id===r.id)){
          reactionsMap[r.message_id].push(r);
          renderReactionRow(r.message_id);
        }
      }
    )
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'reactions'},
      payload=>{
        const r=payload.old;
        if(reactionsMap[r.message_id]){
          reactionsMap[r.message_id]=reactionsMap[r.message_id].filter(x=>x.id!==r.id);
          renderReactionRow(r.message_id);
        }
      }
    ).subscribe();
}

async function toggleReaction(msgId, emoji){
  const existing = (reactionsMap[msgId]||[]).find(r=>r.sender===currentSender&&r.emoji===emoji);
  if(existing){
    // Remove reaction
    await supabaseClient.from('reactions').delete().eq('id', existing.id);
    reactionsMap[msgId]=(reactionsMap[msgId]||[]).filter(r=>r.id!==existing.id);
  } else {
    // Add reaction (remove any previous emoji from me first)
    const myOld = (reactionsMap[msgId]||[]).find(r=>r.sender===currentSender);
    if(myOld){
      await supabaseClient.from('reactions').delete().eq('id', myOld.id);
      reactionsMap[msgId]=(reactionsMap[msgId]||[]).filter(r=>r.id!==myOld.id);
    }
    const {data}=await supabaseClient.from('reactions').insert([{message_id:msgId,sender:currentSender,emoji}]).select().single();
    if(data){ if(!reactionsMap[msgId]) reactionsMap[msgId]=[]; reactionsMap[msgId].push(data); }
  }
  renderReactionRow(msgId);
  closeActions();
}

function renderReactionRow(msgId){
  const row = document.querySelector(`[data-msg-id="${msgId}"] .reactions-row`);
  if(!row) return;
  row.innerHTML='';
  const reactions = reactionsMap[msgId]||[];
  // Group by emoji
  const grouped={};
  reactions.forEach(r=>{ if(!grouped[r.emoji]) grouped[r.emoji]=[]; grouped[r.emoji].push(r); });
  Object.entries(grouped).forEach(([emoji,list])=>{
    const mine = list.some(r=>r.sender===currentSender);
    const chip=document.createElement('span');
    chip.className='reaction-chip'+(mine?' mine':'');
    chip.title=list.map(r=>r.sender==='husband'?'Arsene':'Majorine').join(', ');
    chip.innerHTML=`${emoji}<span class="rc-count">${list.length}</span>`;
    chip.onclick=()=>toggleReaction(msgId, emoji);
    row.appendChild(chip);
  });
}

/* ══ RENDER ══ */
function renderAll(){
  const box = document.getElementById('messages');
  const typing = document.getElementById('typing-wrap');
  box.querySelectorAll('.msg-row,.date-divider:not(:first-child)').forEach(el=>el.remove());
  lastRender = null;
  messages.forEach(m=>renderOne(m,false));
  scrollBottom();
  // Load reactions for all messages
  loadReactions(messages.map(m=>m.id));
}

function renderOne(msg, animate=true){
  const box    = document.getElementById('messages');
  const typing = document.getElementById('typing-wrap');
  const ts     = new Date(msg.created_at);
  const dateStr= ts.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});

  if(dateStr!==lastRender){
    const d=document.createElement('div');
    d.className='date-divider';d.textContent=dateStr;
    box.insertBefore(d,typing);lastRender=dateStr;
  }

  const isMe = msg.sender===currentSender;
  const row  = document.createElement('div');
  row.className=`msg-row ${isMe?'me':'her'}`;
  row.dataset.msgId = msg.id;
  if(!animate) row.style.animation='none';

  /* --- Actions popup --- */
  const actionsEl = document.createElement('div');
  actionsEl.className='msg-actions';
  actionsEl.id=`actions-${msg.id}`;

  // Quick reactions button
  const reactBtn=document.createElement('button');
  reactBtn.className='act-btn';reactBtn.title='React';reactBtn.textContent='😊';
  reactBtn.onclick=(e)=>{ e.stopPropagation(); toggleQuickReactions(msg.id, isMe); };
  actionsEl.appendChild(reactBtn);

  const sep1=document.createElement('div');sep1.className='act-sep';actionsEl.appendChild(sep1);

  // Reply button
  const replyBtn=document.createElement('button');
  replyBtn.className='act-btn';replyBtn.title='Reply';replyBtn.textContent='↩️';
  replyBtn.onclick=(e)=>{ e.stopPropagation(); startReply(msg); closeActions(); };
  actionsEl.appendChild(replyBtn);

  /* --- Quick reactions popup --- */
  const qrEl=document.createElement('div');
  qrEl.className='quick-reactions';qrEl.id=`qr-${msg.id}`;
  QUICK_REACTIONS.forEach(e=>{
    const b=document.createElement('button');b.className='qr-btn';b.textContent=e;
    b.onclick=(ev)=>{ ev.stopPropagation(); toggleReaction(msg.id,e); };
    qrEl.appendChild(b);
  });

  /* --- Bubble wrap --- */
  const bWrap=document.createElement('div');
  bWrap.className='bubble-wrap';

  const bub=document.createElement('div');
  bub.className='bubble';

  // Reply preview inside bubble
  if(msg.reply_to_id){
    const orig = messages.find(m=>m.id===msg.reply_to_id);
    if(orig){
      const rp=document.createElement('div');
      rp.className='reply-preview';
      rp.innerHTML=`<span class="rp-name">${orig.sender==='husband'?'Arsene':'Majorine'}</span>${orig.text||''}`;
      rp.onclick=(e)=>{ e.stopPropagation(); scrollToMsg(orig.id); };
      bub.appendChild(rp);
    }
  }

  const txt=(msg.text||'').trim();
  const pure=txt.replace(/\s/g,'');
  const emojiOnly=pure.length>0&&pure.length<=8&&[...txt].every(c=>c.codePointAt(0)>127||c===' ');
  if(emojiOnly) bub.classList.add('e-big');

  const txtNode=document.createTextNode(txt);
  bub.appendChild(txtNode);

  // Long press / click to show actions
  let pressTimer=null;
  bub.addEventListener('touchstart',()=>{ pressTimer=setTimeout(()=>showActions(msg.id),500); },{passive:true});
  bub.addEventListener('touchend',()=>{ clearTimeout(pressTimer); },{passive:true});
  bub.addEventListener('contextmenu',(e)=>{ e.preventDefault(); showActions(msg.id); });

  bWrap.appendChild(actionsEl);
  bWrap.appendChild(qrEl);
  bWrap.appendChild(bub);

  /* --- Reactions row --- */
  const reactRow=document.createElement('div');
  reactRow.className='reactions-row';

  /* --- Meta --- */
  const meta=document.createElement('div');
  meta.className='msg-meta';
  const timeEl=document.createElement('span');
  timeEl.textContent=ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  meta.appendChild(timeEl);
  if(isMe){
    const ticks=document.createElement('span');
    ticks.className='read-ticks '+(msg.read_at?'read':'sent');
    ticks.textContent=msg.read_at?'✓✓':'✓';
    meta.appendChild(ticks);
  }

  row.appendChild(bWrap);
  row.appendChild(reactRow);
  row.appendChild(meta);
  box.insertBefore(row,typing);

  // Load reaction for this single message if arrived live
  if(animate) loadReactions([msg.id]);
}

/* ══ ACTIONS ══ */
function showActions(msgId){
  closeActions();
  const el = document.getElementById(`actions-${msgId}`);
  if(el){ el.classList.add('show'); activeActionsId=msgId; }
}
function toggleQuickReactions(msgId, isMe){
  const qr = document.getElementById(`qr-${msgId}`);
  if(!qr) return;
  const isOpen = qr.classList.contains('show');
  closeActions();
  const actEl = document.getElementById(`actions-${msgId}`);
  if(actEl) actEl.classList.add('show');
  activeActionsId = msgId;
  if(!isOpen) qr.classList.add('show');
}
function closeActions(){
  if(activeActionsId){
    const el=document.getElementById(`actions-${activeActionsId}`);
    const qr=document.getElementById(`qr-${activeActionsId}`);
    if(el) el.classList.remove('show');
    if(qr) qr.classList.remove('show');
    activeActionsId=null;
  }
}
document.addEventListener('click', ()=>closeActions());

/* ══ REPLY ══ */
function startReply(msg){
  replyingTo = msg;
  const banner = document.getElementById('reply-banner');
  document.getElementById('rb-name').textContent = msg.sender==='husband'?'Arsene':'Majorine';
  document.getElementById('rb-text').textContent = msg.text||'';
  banner.classList.add('show');
  document.getElementById('msg-input').focus();
}
function cancelReply(){
  replyingTo=null;
  document.getElementById('reply-banner').classList.remove('show');
}
function scrollToMsg(id){
  const el=document.querySelector(`[data-msg-id="${id}"]`);
  if(!el) return;
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.querySelector('.bubble').style.outline='2px solid var(--gold)';
  setTimeout(()=>el.querySelector('.bubble').style.outline='',1200);
}

/* ══ SEND ══ */
async function sendMessage(){
  const inp=document.getElementById('msg-input');
  const txt=inp.value.trim();
  if(!txt) return;
  inp.value=''; autoResize(inp);
  clearTimeout(typingTimer); isTypingActive=false; sendTypingStatus(false);

  const replyId = replyingTo?.id||null;
  cancelReply();



  const payload={text:txt,sender:currentSender};
  if(replyId) payload.reply_to_id=replyId;

  const {error}=await supabaseClient.from('messages').insert([payload]);
  if(error){ console.error('Send failed:',error); toast('Message failed 😢'); }
}




/* ══ EMOJI PICKER ══ */
function buildEmojiPicker(){
  const tabs=document.getElementById('etabs'); let first=true;
  for(const [lbl,list] of Object.entries(EMOJIS)){
    const btn=document.createElement('button');
    btn.className='etab'+(first?' active':'');
    btn.textContent=lbl.split(' ')[0];btn.title=lbl;
    btn.onclick=()=>{ document.querySelectorAll('.etab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); fillGrid(list); };
    tabs.appendChild(btn);
    if(first) fillGrid(list);
    first=false;
  }
}
function fillGrid(list){
  const g=document.getElementById('egrid');g.innerHTML='';
  list.forEach(e=>{
    const c=document.createElement('span');c.className='ecell';c.textContent=e;
    c.onclick=()=>insertEmoji(e);g.appendChild(c);
  });
}
function insertEmoji(e){
  const inp=document.getElementById('msg-input');
  const pos=inp.selectionStart??inp.value.length;
  inp.value=inp.value.slice(0,pos)+e+inp.value.slice(pos);
  inp.focus();inp.selectionStart=inp.selectionEnd=pos+[...e].length;
  autoResize(inp);
}
function toggleEmoji(ev){ev.stopPropagation();document.getElementById('emoji-panel').classList.toggle('open');}
document.addEventListener('click',ev=>{
  const p=document.getElementById('emoji-panel');
  if(!p.contains(ev.target)) p.classList.remove('open');
});

/* ══ HELPERS ══ */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function scrollBottom(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
function toast(msg,dur=3000){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
</script>
