<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; min-height: 100vh; background: #0d0a0f; color: #f5ede8; display: flex; align-items: center; justify-content: center; overflow-x: hidden; touch-action: manipulation; }
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 20% 50%, #2a0e1a 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #1a0a2e 0%, transparent 55%), radial-gradient(ellipse at 60% 80%, #1e0d0d 0%, transparent 50%), #0d0a0f; }
  .petals-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .petal { position: absolute; top: -40px; font-size: 18px; opacity: 0; animation: fallPetal linear infinite; }
  @keyframes fallPetal { 0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.3; } 100% { transform: translateY(110vh) rotate(540deg) translateX(80px); opacity: 0; } }
  .wrap { position: relative; z-index: 10; width: 100%; max-width: 520px; padding: 1rem; display: flex; flex-direction: column; align-items: center; }
  .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }
  .card { width: 100%; max-width: 520px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,200,190,0.15); border-radius: 24px; padding: clamp(1.5rem, 4vw, 3rem); backdrop-filter: blur(20px); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,150,130,0.06) 0%, transparent 50%, rgba(180,100,200,0.04) 100%); pointer-events: none; }
  .logo { text-align: center; margin-bottom: 2rem; }
  .logo-heart { font-size: 2.8rem; display: block; margin-bottom: 0.5rem; animation: heartbeat 2s ease-in-out infinite; }
  @keyframes heartbeat { 0%, 100% { transform: scale(1); } 14% { transform: scale(1.15); } 28% { transform: scale(1); } 42% { transform: scale(1.1); } 56% { transform: scale(1); } }
  .logo-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; letter-spacing: 0.12em; color: #f5d5c8; }
  .logo-sub { font-size: 0.72rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(245,200,185,0.5); margin-top: 0.3rem; }
  .progress-bar { width: 100%; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c4637a, #e8a87c); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .step-label { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(245,200,185,0.45); margin-bottom: 0.6rem; }
  .question-text { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; font-style: italic; color: #f5d5c8; margin-bottom: 1.6rem; line-height: 1.4; min-height: 2.8rem; }
  .input-wrap { position: relative; margin-bottom: 1.2rem; }
  .input-wrap input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,180,160,0.2); border-radius: 12px; padding: 0.9rem 1.2rem; font-family: 'Jost', sans-serif; font-size: 1rem; color: #f5ede8; letter-spacing: 0.05em; outline: none; transition: border-color 0.3s, background 0.3s; }
  .input-wrap input::placeholder { color: rgba(245,220,210,0.3); }
  .input-wrap input:focus { border-color: rgba(196,99,122,0.6); background: rgba(255,255,255,0.09); }
  .input-wrap input.error { border-color: rgba(220,80,80,0.7); animation: shake 0.35s ease; }
  .input-wrap input.success { border-color: rgba(100,210,140,0.7); }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
  .err-msg { font-size: 0.78rem; color: #e87070; margin-top: 0.4rem; min-height: 1.1rem; letter-spacing: 0.04em; display: flex; align-items: center; gap: 0.4rem; }
  .btn { width: 100%; padding: 0.9rem; border: none; border-radius: 12px; background: linear-gradient(135deg, #c4637a 0%, #b85575 50%, #9e4a8a 100%); color: #fff; font-family: 'Jost', sans-serif; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.15s; position: relative; overflow: hidden; }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: scale(0.98); }
  .dots { display: flex; gap: 8px; justify-content: center; margin-top: 1.8rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,180,160,0.2); transition: background 0.3s, transform 0.3s; }
  .dot.done { background: rgba(196,99,122,0.8); transform: scale(1.2); }
  .dot.current { background: rgba(245,200,185,0.9); transform: scale(1.3); }
  .lockout-msg { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: #f5d5c8; text-align: center; margin: 1rem 0; opacity: 0.8; }
  @media (max-width: 600px) { body { padding: 1rem; } .wrap { padding: 0; max-width: 100%; } .logo-title { font-size: 1.8rem; } .question-text { font-size: 1.25rem; min-height: auto; } .btn { padding: 1rem; font-size: 0.8rem; } .card { border-radius: 18px; } }
</style>
</head>
<body>

<div class="bg"></div>
<div class="petals-container" id="petals"></div>

<div class="wrap">
  <div class="screen active" id="screen-login">
    <div class="card">
      <div class="logo">
        <span class="logo-heart">🌹</span>
        <div class="logo-title">Arsene&Majorine Secret Place</div>
        <div class="logo-sub">Only Us know the way in</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>
      <div class="step-label" id="step-label">Question 1 of 5</div>
      <div class="question-text" id="question-text"></div>
      <div class="input-wrap">
        <input type="text" id="answer-input" placeholder="Your answer..." autocomplete="off" spellcheck="false" />
        <div class="err-msg" id="err-msg"></div>
      </div>
      <button class="btn" id="next-btn" onclick="checkAnswer()">Continue →</button>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>

(function () {
  'use strict';


  const MAX_FAILS = 8;
  const LOCKOUT_MS = 2 * 60 * 1000; 


  const Q = [
    {
      q: "What is the number?",
    
      h: "670671cd97404156226e507973f2ab8330d3022ca96e0c93bdbdb320c41adcaf",
      hint: "Think carefully, my love..."
    },
    {
      q: "What is the love code?",
  
      h: "2f707f7bd62d62b1a431a81583f0ae2f08795cadfa259ef5e96372ba3918beb4",
      hint: "Only we know this one..."
    },
    {
      q: "How many kids?",
      
      h: "ef2d127de37b942baad06145e54b0c619a1f22327b2ebbcfbec78f5564afe39d",
      hint: "Our little family..."
    },
    {
      q: "Behind the necklace?",
    
      h: "3da65d57b6f2b2e6ec8d7c86b12447b147f67561ca98a195e14a50ee6eb95bd0",
      hint: "Those special words..."
    },
    {
      q: "What do we rely on?",

      h: "5ba7b791a030488e0537f685fd269c0e372ac7a9c6a5ab13fd116d5f6e233f45",
      hint: "Our foundation..."
    },
    {
      q: "What is Majorias's major responsibility?",
  
      h: "3a1e987219479663b48ebafbb61f1411e1e4eaa360c93ff6640a4c4296acede7",
      hint: "majorine is the one who set this..."
    }
  ];


  let step = 0;
  let wrongCount = 0;
  let attemptsThisStep = 0;
  let locked = false;

  
  async function sha256(message) {
    const enc = new TextEncoder();
    const buf = await crypto.subtle.digest('SHA-256', enc.encode(message));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }


  function norm(s) {
    return s.trim().toLowerCase().replace(/\s+/g, ' ');
  }

  function triggerLockout() {
    locked = true;
    const btn = document.getElementById('next-btn');
    const inp = document.getElementById('answer-input');
    const err = document.getElementById('err-msg');
    btn.disabled = true;
    inp.disabled = true;
    let remaining = LOCKOUT_MS / 1000;
    err.textContent = `✦ Too many attempts. Wait ${remaining}s...`;
    const t = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(t);
        locked = false;
        wrongCount = 0;
        attemptsThisStep = 0;
        btn.disabled = false;
        inp.disabled = false;
        err.textContent = '';
        inp.focus();
      } else {
        err.textContent = `✦ Too many attempts. Wait ${remaining}s...`;
      }
    }, 1000);
  }

  async function checkAnswer() {
    if (locked) return;

    const inp = document.getElementById('answer-input');
    const err = document.getElementById('err-msg');
    const val = norm(inp.value);

    if (!val) { err.textContent = '✦ Please enter your answer'; return; }


    const userHash = await sha256(val);
    const correct = userHash === Q[step].h;

    if (correct) {
      inp.className = 'success';
      err.textContent = '';
      attemptsThisStep = 0;
      step++;
      document.getElementById('progress').style.width = (step / Q.length * 100) + '%';

      if (step >= Q.length) {
        setTimeout(() => {
          // Mark authenticated and redirect
          sessionStorage.setItem('_am_auth', Date.now().toString(36));
          window.location.href = 'home-page.html';
        }, 600);
      } else {
        setTimeout(renderStep, 450);
      }
    } else {
      wrongCount++;
      attemptsThisStep++;
      inp.className = 'error';
      setTimeout(() => inp.classList.remove('error'), 400);

      if (wrongCount >= MAX_FAILS) {
        triggerLockout();
      } else if (attemptsThisStep >= 2) {
        err.textContent = '✦ ' + Q[step].hint;
      } else {
        err.textContent = "✦ That's not quite right, try again";
      }
    }
  }

  // ── RENDER STEP ─────────────────────────────────────────────────
  function renderStep() {
    document.getElementById('question-text').textContent = Q[step].q;
    document.getElementById('step-label').textContent = `Question ${step + 1} of ${Q.length}`;
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').className = '';
    document.getElementById('err-msg').textContent = '';
    renderDots();
    document.getElementById('answer-input').focus();
    attemptsThisStep = 0;
  }

  function renderDots() {
    const c = document.getElementById('dots');
    c.innerHTML = '';
    for (let i = 0; i < Q.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < step ? ' done' : i === step ? ' current' : '');
      c.appendChild(d);
    }
  }

  // ── EXPOSE ONLY WHAT THE BUTTON NEEDS ──────────────────────────
  window.checkAnswer = checkAnswer;

  // ── INPUT ENTER KEY ─────────────────────────────────────────────
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  // ── PETALS ──────────────────────────────────────────────────────
  const PETALS = ['🌸', '🌺', '🌹', '💮', '🏵', '✿', '❀'];
  function spawnPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (12 + Math.random() * 14) + 'px';
    p.style.animationDuration = (8 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    document.getElementById('petals').appendChild(p);
    setTimeout(() => p.remove(), 20000);
  }
  setInterval(spawnPetal, 1800);
  for (let i = 0; i < 5; i++) setTimeout(spawnPetal, i * 400);

  // ── INIT ────────────────────────────────────────────────────────
  renderStep();

})();
</script>
</body>
</html>
